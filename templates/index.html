<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷达心率/呼吸监测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .metric-card {
            text-align: center;
        }

        .metric-label {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .metric-value {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .metric-value.heart {
            color: #e74c3c;
        }

        .metric-value.respiratory {
            color: #3498db;
        }

        .metric-unit {
            font-size: 0.4em;
            color: #999;
            font-weight: normal;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background-color: #2ecc71;
        }

        .status-indicator.inactive {
            background-color: #95a5a6;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .chart-card {
            grid-column: 1 / -1;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 1.4em;
            color: #333;
            font-weight: 600;
        }

        .chart-container {
            position: relative;
            height: 400px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        button.secondary {
            background: #ecf0f1;
            color: #333;
        }

        button.secondary:hover {
            background: #bdc3c7;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-text {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.95em;
            opacity: 0.8;
        }

        .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .metric-value {
                font-size: 2.5em;
            }

            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🫀 雷达生命体征监测系统</h1>
            <p class="subtitle">基于BGT60TR13C雷达的非接触式心率与呼吸监测</p>
        </header>

        <div class="dashboard">
            <!-- 心率卡片 -->
            <div class="card metric-card">
                <div class="icon">❤️</div>
                <div class="metric-label">
                    <span class="status-indicator" id="heartStatus"></span>
                    心率
                </div>
                <div class="metric-value heart">
                    <span id="heartRate">--</span>
                    <span class="metric-unit">BPM</span>
                </div>
            </div>

            <!-- 呼吸率卡片 -->
            <div class="card metric-card">
                <div class="icon">🫁</div>
                <div class="metric-label">
                    <span class="status-indicator" id="respStatus"></span>
                    呼吸率
                </div>
                <div class="metric-value respiratory">
                    <span id="respiratoryRate">--</span>
                    <span class="metric-unit">BPM</span>
                </div>
            </div>

            <!-- 雷达状态卡片 -->
            <div class="card metric-card">
                <div class="icon">📡</div>
                <div class="metric-label">
                    <span class="status-indicator" id="radarStatus"></span>
                    雷达状态
                </div>
                <div class="metric-value" style="color: #27ae60; font-size: 1.5em;">
                    <div id="frameCount" style="margin-bottom: 10px;">帧数: 0</div>
                    <div id="bufferStatus" style="font-size: 0.5em; color: #666;">缓冲: 0/0/0/0</div>
                </div>
            </div>

            <!-- 原始雷达数据波形 -->
            <div class="card chart-card">
                <div class="chart-header">
                    <div class="chart-title">📊 原始雷达数据 (未处理)</div>
                    <div style="font-size: 0.8em; color: #666;">实时雷达回波信号</div>
                </div>
                <div class="chart-container">
                    <canvas id="rawDataChart"></canvas>
                </div>
            </div>

            <!-- 心率波形图 -->
            <div class="card chart-card">
                <div class="chart-header">
                    <div class="chart-title">💓 心率波形 (滤波后)</div>
                </div>
                <div class="chart-container">
                    <canvas id="heartRateChart"></canvas>
                </div>
            </div>

            <!-- 呼吸波形图 -->
            <div class="card chart-card">
                <div class="chart-header">
                    <div class="chart-title">🌊 呼吸波形 (滤波后)</div>
                </div>
                <div class="chart-container">
                    <canvas id="respiratoryChart"></canvas>
                </div>
            </div>

            <!-- 调试信息卡片 -->
            <div class="card" style="grid-column: 1 / -1;">
                <h3 style="margin-bottom: 15px; color: #333;">🔍 调试信息</h3>
                <div id="debugInfo" style="font-family: 'Courier New', monospace; font-size: 0.9em; color: #555; white-space: pre-wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto;">
                    等待数据...
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="primary" onclick="startMonitoring()">▶️ 开始监测</button>
            <button class="secondary" onclick="stopMonitoring()">⏸️ 暂停监测</button>
        </div>

        <p class="info-text">
            💡 提示: 请保持静止状态，距离雷达0.5-2米，以获得最佳监测效果
        </p>
    </div>

    <script>
        // 图表配置
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
                duration: 0  // 禁用动画以提高性能
            },
            scales: {
                x: {
                    display: false,
                    grid: {
                        display: false
                    }
                },
                y: {
                    grid: {
                        color: 'rgba(0, 0, 0, 0.05)'
                    },
                    ticks: {
                        font: {
                            size: 11
                        }
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    enabled: false
                }
            }
        };

        // 原始数据图表
        const rawDataCtx = document.getElementById('rawDataChart').getContext('2d');
        const rawDataChart = new Chart(rawDataCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '原始信号',
                    data: [],
                    borderColor: '#9b59b6',
                    backgroundColor: 'rgba(155, 89, 182, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: commonOptions
        });

        // 心率图表
        const heartRateCtx = document.getElementById('heartRateChart').getContext('2d');
        const heartRateChart = new Chart(heartRateCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '心率信号',
                    data: [],
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: commonOptions
        });

        // 呼吸图表
        const respiratoryCtx = document.getElementById('respiratoryChart').getContext('2d');
        const respiratoryChart = new Chart(respiratoryCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '呼吸信号',
                    data: [],
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: commonOptions
        });

        let updateInterval;
        let isMonitoring = false;
        let consecutiveErrors = 0;

        // 更新数据
        async function updateData() {
            try {
                const response = await fetch('/api/data');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // 检查是否有错误
                if (data.error) {
                    throw new Error(data.error);
                }
                
                consecutiveErrors = 0;  // 重置错误计数

                // 更新数值显示
                document.getElementById('heartRate').textContent = 
                    data.current_heart_rate > 0 ? data.current_heart_rate.toFixed(1) : '--';
                document.getElementById('respiratoryRate').textContent = 
                    data.current_respiratory_rate > 0 ? data.current_respiratory_rate.toFixed(1) : '--';

                // 更新雷达状态
                document.getElementById('frameCount').textContent = `帧数: ${data.frame_count || 0}`;
                
                if (data.buffer_sizes) {
                    document.getElementById('bufferStatus').textContent = 
                        `缓冲: ${data.buffer_sizes.raw_phase}/${data.buffer_sizes.heart_rate}/${data.buffer_sizes.respiratory}/${data.buffer_sizes.raw_data}`;
                }

                // 更新状态指示器
                const heartStatus = document.getElementById('heartStatus');
                const respStatus = document.getElementById('respStatus');
                const radarStatus = document.getElementById('radarStatus');
                
                if (data.current_heart_rate > 0) {
                    heartStatus.classList.add('active');
                    heartStatus.classList.remove('inactive');
                } else {
                    heartStatus.classList.remove('active');
                    heartStatus.classList.add('inactive');
                }

                if (data.current_respiratory_rate > 0) {
                    respStatus.classList.add('active');
                    respStatus.classList.remove('inactive');
                } else {
                    respStatus.classList.remove('active');
                    respStatus.classList.add('inactive');
                }

                if (data.is_running) {
                    radarStatus.classList.add('active');
                    radarStatus.classList.remove('inactive');
                } else {
                    radarStatus.classList.remove('active');
                    radarStatus.classList.add('inactive');
                }

                // 更新原始数据波形
                if (data.raw_data_waveform && data.raw_data_waveform.length > 0) {
                    rawDataChart.data.labels = Array(data.raw_data_waveform.length).fill('');
                    rawDataChart.data.datasets[0].data = data.raw_data_waveform;
                    rawDataChart.update('none');
                }

                // 更新心率波形
                if (data.heart_rate_waveform && data.heart_rate_waveform.length > 0) {
                    heartRateChart.data.labels = Array(data.heart_rate_waveform.length).fill('');
                    heartRateChart.data.datasets[0].data = data.heart_rate_waveform;
                    heartRateChart.update('none');
                }

                // 更新呼吸波形
                if (data.respiratory_waveform && data.respiratory_waveform.length > 0) {
                    respiratoryChart.data.labels = Array(data.respiratory_waveform.length).fill('');
                    respiratoryChart.data.datasets[0].data = data.respiratory_waveform;
                    respiratoryChart.update('none');
                }

                // 更新调试信息
                const debugInfo = document.getElementById('debugInfo');
                debugInfo.textContent = `
运行状态: ${data.is_running ? '✅ 运行中' : '❌ 已停止'}
帧计数: ${data.frame_count || 0}
心率: ${data.current_heart_rate.toFixed(2)} BPM
呼吸率: ${data.current_respiratory_rate.toFixed(2)} BPM
原始数据点: ${data.raw_data_waveform ? data.raw_data_waveform.length : 0}
心率数据点: ${data.heart_rate_waveform ? data.heart_rate_waveform.length : 0}
呼吸数据点: ${data.respiratory_waveform ? data.respiratory_waveform.length : 0}
缓冲区状态: ${JSON.stringify(data.buffer_sizes, null, 2)}
错误信息: ${data.error_message || '无'}
最后更新: ${new Date().toLocaleTimeString()}
                `.trim();

            } catch (error) {
                consecutiveErrors++;
                console.error('获取数据失败:', error);
                
                const debugInfo = document.getElementById('debugInfo');
                debugInfo.textContent = `
❌ 错误 (连续 ${consecutiveErrors} 次)
${error.message}
最后尝试: ${new Date().toLocaleTimeString()}

请检查:
1. 后端服务是否正常运行
2. 雷达设备是否连接
3. 浏览器控制台是否有详细错误信息
                `.trim();
                
                // 如果连续错误超过10次，停止更新
                if (consecutiveErrors > 10) {
                    console.error('连续错误次数过多，停止更新');
                    stopMonitoring();
                }
            }
        }

        // 开始监测
        async function startMonitoring() {
            if (isMonitoring) return;

            try {
                await fetch('/api/start');
                isMonitoring = true;
                
                // 每100ms更新一次数据
                updateInterval = setInterval(updateData, 100);
                
                console.log('监测已启动');
            } catch (error) {
                console.error('启动监测失败:', error);
                alert('启动监测失败，请检查雷达连接');
            }
        }

        // 停止监测
        async function stopMonitoring() {
            if (!isMonitoring) return;

            try {
                await fetch('/api/stop');
                isMonitoring = false;
                
                if (updateInterval) {
                    clearInterval(updateInterval);
                }
                
                console.log('监测已停止');
            } catch (error) {
                console.error('停止监测失败:', error);
            }
        }

        // 页面加载时自动开始监测
        window.addEventListener('load', () => {
            setTimeout(startMonitoring, 1000);
        });

        // 页面关闭时停止监测
        window.addEventListener('beforeunload', stopMonitoring);
    </script>
</body>
</html>
